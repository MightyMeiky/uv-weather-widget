<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7f4ee" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐗</text></svg>" />
  <title>Frischlingswetter</title>
  <!-- No-flash dark mode: apply theme before first paint -->
  <script>
    (function() {
      const t = localStorage.getItem('theme')
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark')
    })()
  </script>
  <link rel="stylesheet" href="/main.css" />
</head>
<body>
  <div id="app">

    <header>
      <div class="brand">
        <span class="brand-icon">🐗</span>
        <span class="brand-name">Frischlingswetter</span>
      </div>
      <div class="header-right">
        <span class="header-location">📍 Landsberied</span>
        <span class="last-updated" id="last-updated">–</span>
        <button class="theme-toggle" id="theme-toggle" aria-label="Dark mode umschalten">☀️</button>
      </div>
    </header>

    <main>

      <!-- HEUTE box with tab switcher -->
      <section class="heute-box" id="heute-box">
        <div class="tab-bar">
          <button class="tab" data-day="heute">Heute</button>
          <button class="tab" data-day="morgen">Morgen</button>
        </div>
        <div class="heute-label" id="heute-label">HEUTE · 8–14 Uhr</div>
        <div id="action-items"></div>
        <div class="heute-summary" id="heute-summary"></div>
      </section>

      <!-- Three charts — always visible -->
      <div class="charts-grid">

        <div class="chart-panel">
          <div class="chart-title">UV-Verlauf</div>
          <div class="chart-wrapper">
            <canvas id="uv-chart"></canvas>
          </div>
        </div>

        <div class="chart-panel">
          <div class="chart-title">Regenwahrscheinlichkeit</div>
          <div class="chart-wrapper">
            <canvas id="rain-chart"></canvas>
          </div>
        </div>

        <div class="chart-panel">
          <div class="chart-title">Wind km/h</div>
          <div class="chart-wrapper">
            <canvas id="wind-chart"></canvas>
          </div>
        </div>

      </div>

      <!-- Alert banner -->
      <div class="alert-banner hidden" id="alert-banner">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text" id="alert-text"></span>
      </div>

    </main>

    <footer>
      <button class="refresh-btn" id="refresh-btn">↻ Aktualisieren</button>
      <div class="footer-right">
        <span class="data-source">Daten: Open-Meteo</span>
        <span class="built-by">gebaut von Jonte &amp; Meike 🐗</span>
      </div>
    </footer>

  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
