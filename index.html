<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7f4ee" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>UV & Wetter · Landsberied</title>
  <link rel="stylesheet" href="/main.css" />
</head>
<body>
  <div id="app">

    <header>
      <div class="location">
        <span class="location-icon">📍</span>
        <span class="location-name">Landsberied</span>
      </div>
      <div class="last-updated" id="last-updated">–</div>
    </header>

    <main>
      <div class="layout-grid">

        <!-- ── Primary column: UV card + combined chart ── -->
        <div class="col-primary">

          <section class="card uv-card" id="uv-card">
            <div class="card-label">UV-Index</div>
            <div class="uv-display">
              <div class="uv-value" id="uv-value">–</div>
              <div class="uv-level" id="uv-level">Laden…</div>
            </div>
            <div class="uv-advice" id="uv-advice"></div>
            <div class="uv-peak" id="uv-peak"></div>
          </section>

          <section class="card chart-card">
            <div class="card-label">Tagesverlauf</div>
            <div class="chart-wrapper">
              <canvas id="day-chart"></canvas>
            </div>
          </section>

        </div>

        <!-- ── Secondary column: action cards ── -->
        <div class="col-secondary">
          <section id="action-cards"></section>
        </div>

      </div>

      <!-- Full-width alert banner, below the grid -->
      <div class="alert-banner hidden" id="alert-banner">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text" id="alert-text"></span>
      </div>
    </main>

    <footer>
      <button class="refresh-btn" id="refresh-btn">↻ Aktualisieren</button>
      <span class="data-source">Daten: Open-Meteo</span>
    </footer>

  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
